name: Ekadashi Reminders

on:
  workflow_dispatch:
  schedule:
    # All times are 07:00 IST (= 01:30 UTC)
    # Jan
    - cron: '30 1 13 1 *'   # Shattila
    - cron: '30 1 28 1 *'   # Jaya
    # Feb
    - cron: '30 1 12 2 *'   # Vijaya
    - cron: '30 1 26 2 *'   # Amalaki
    # Mar (adjust these two if you follow Udaya tithi in 2026: 15th & 29th)
    - cron: '30 1 14 3 *'   # Papamochani (change to 15 if needed)
    - cron: '30 1 28 3 *'   # Kamada (change to 29 if needed)
    # Apr
    - cron: '30 1 12 4 *'   # Varuthini
    - cron: '30 1 26 4 *'   # Mohini
    # May
    - cron: '30 1 12 5 *'   # Apara
    - cron: '30 1 26 5 *'   # Padmini
    # Jun
    - cron: '30 1 10 6 *'   # Parama
    - cron: '30 1 24 6 *'   # Nirjala
    # Jul
    - cron: '30 1 9 7 *'    # Yogini
    - cron: '30 1 24 7 *'   # Devshayani
    # Aug
    - cron: '30 1 8 8 *'    # Kamika
    - cron: '30 1 22 8 *'   # Shravana Putrada
    # Sep
    - cron: '30 1 6 9 *'    # Aja
    - cron: '30 1 21 9 *'   # Parivartini
    # Oct
    - cron: '30 1 5 10 *'   # Indira
    - cron: '30 1 21 10 *'  # Papankusha
    # Nov
    - cron: '30 1 4 11 *'   # Rama
    - cron: '30 1 19 11 *'  # Devutthana
    # Dec
    - cron: '30 1 3 12 *'   # Utpanna
    - cron: '30 1 19 12 *'  # Mokshada

# Optional: force Node 24 now (cleans up deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-email-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Optional: fail early with a clear message if a secret is missing
      - name: Validate mail secrets
        run: |
          test -n "${{ secrets.EMAIL_SERVER }}" || { echo "EMAIL_SERVER is empty"; exit 1; }
          test -n "${{ secrets.EMAIL_PORT }}" || { echo "EMAIL_PORT is empty"; exit 1; }
          test -n "${{ secrets.EMAIL_USERNAME }}" || { echo "EMAIL_USERNAME is empty"; exit 1; }
          test -n "${{ secrets.EMAIL_PASSWORD }}" || { echo "EMAIL_PASSWORD is empty"; exit 1; }
          test -n "${{ secrets.RECIPIENT_EMAIL }}" || { echo "RECIPIENT_EMAIL is empty"; exit 1; }

      - name: Send Email Reminder
        uses: dawidd6/action-send-mail@v11
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}    # e.g., smtp.gmail.com
          server_port: ${{ secrets.EMAIL_PORT }}         # 465 for SSL, 587 for STARTTLS
          secure: true                                   # true for 465; set to false if you switch to 587
          username: ${{ secrets.EMAIL_USERNAME }}        # full email address
          password: ${{ secrets.EMAIL_PASSWORD }}        # Gmail App Password (16 chars, no spaces)
          subject: "🕉️ Ekadashi Reminder - Tomorrow is a Sacred Day!"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: "\"Ekadashi Bot\" <${{ secrets.EMAIL_USERNAME }}>"
          body: |
            🙏 Namaste!

            This is your reminder that **TOMORROW is EKADASHI** - a sacred fasting day according to the Telugu calendar.

            **Ekadashi Benefits:**
            • Spiritual purification
            • Enhanced devotion
            • Better health through fasting
            • Peace and mental clarity

            May you have a blessed and fulfilling Ekadashi!

            ✨ Hari Om ✨