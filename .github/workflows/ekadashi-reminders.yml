

name: Ekadashi Reminders

on:
  workflow_dispatch:  
  schedule:
    # Shattila Ekadashi - Jan 13 at 7 AM IST (1:30 AM UTC)
    - cron: '30 1 13 1 *'
    # Jaya Ekadashi - Jan 28 at 7 AM IST
    - cron: '30 1 28 1 *'
    # Vijaya Ekadashi - Feb 12 at 7 AM IST
    - cron: '30 1 12 2 *'
    # Amalaki Ekadashi - Feb 26 at 7 AM IST
    - cron: '30 1 26 2 *'
    # Papamochani Ekadashi - Mar 14 at 7 AM IST
    - cron: '30 1 14 3 *'
    # Kamada Ekadashi - Mar 28 at 7 AM IST
    - cron: '30 1 28 3 *'
    # Varuthini Ekadashi - Apr 12 at 7 AM IST
    - cron: '30 1 12 4 *'
    # Mohini Ekadashi - Apr 26 at 7 AM IST
    - cron: '30 1 26 4 *'
    # Apara Ekadashi - May 12 at 7 AM IST
    - cron: '30 1 12 5 *'
    # Padmini Ekadashi - May 26 at 7 AM IST
    - cron: '30 1 26 5 *'
    # Parama Ekadashi - Jun 10 at 7 AM IST
    - cron: '30 1 10 6 *'
    # Nirjala Ekadashi - Jun 24 at 7 AM IST
    - cron: '30 1 24 6 *'
    # Yogini Ekadashi - Jul 9 at 7 AM IST
    - cron: '30 1 9 7 *'
    # Devshayani Ekadashi - Jul 24 at 7 AM IST
    - cron: '30 1 24 7 *'
    # Kamika Ekadashi - Aug 8 at 7 AM IST
    - cron: '30 1 8 8 *'
    # Shravana Putrada Ekadashi - Aug 22 at 7 AM IST
    - cron: '30 1 22 8 *'
    # Aja Ekadashi - Sep 6 at 7 AM IST
    - cron: '30 1 6 9 *'
    # Parivartini Ekadashi - Sep 21 at 7 AM IST
    - cron: '30 1 21 9 *'
    # Indira Ekadashi - Oct 5 at 7 AM IST
    - cron: '30 1 5 10 *'
    # Papankusha Ekadashi - Oct 21 at 7 AM IST
    - cron: '30 1 21 10 *'
    # Rama Ekadashi - Nov 4 at 7 AM IST
    - cron: '30 1 4 11 *'
    # Devutthana Ekadashi - Nov 19 at 7 AM IST
    - cron: '30 1 19 11 *'
    # Utpanna Ekadashi - Dec 3 at 7 AM IST
    - cron: '30 1 3 12 *'
    # Mokshada Ekadashi - Dec 19 at 7 AM IST
    - cron: '30 1 19 12 *'

jobs:
  send-email-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Send Email Reminder
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SERVER }}
          server_port: ${{ secrets.EMAIL_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🕉️ Ekadashi Reminder - Tomorrow is a Sacred Day!"
          to: ${{ secrets.RECIPIENT_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            🙏 Namaste!
            
            This is your reminder that **TOMORROW is EKADASHI** - a sacred fasting day according to the Telugu calendar.
            
            **Ekadashi Benefits:**
            • Spiritual purification
            • Enhanced devotion
            • Better health through fasting
            • Peace and mental clarity
            
            May you have a blessed and fulfilling Ekadashi!
            
            ✨ Hari Om ✨
